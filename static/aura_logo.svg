<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc33;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hexagon background with glow -->
  <polygon
    points="50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5"
    fill="none"
    stroke="url(#hexGradient)"
    stroke-width="3"
    filter="url(#glow)"
  />

  <!-- Inner hexagon -->
  <polygon
    points="50,15 85,32.5 85,67.5 50,85 15,67.5 15,32.5"
    fill="#0a0a0a"
    stroke="#00ff41"
    stroke-width="1"
    opacity="0.8"
  />

  <!-- Letter A with glow -->
  <text
    x="50"
    y="68"
    font-family="'Courier New', monospace"
    font-size="50"
    font-weight="bold"
    fill="#00ff41"
    text-anchor="middle"
    filter="url(#glow)"
  >A</text>

  <!-- Decorative corner accents -->
  <line x1="50" y1="5" x2="50" y2="15" stroke="#00ff41" stroke-width="1" opacity="0.6"/>
  <line x1="93" y1="27.5" x2="85" y2="32.5" stroke="#00ff41" stroke-width="1" opacity="0.6"/>
  <line x1="7" y1="27.5" x2="15" y2="32.5" stroke="#00ff41" stroke-width="1" opacity="0.6"/>
</svg>