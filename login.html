<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI - Вхід</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #0a0a0a;
            color: #00ff41;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .terminal {
            background: #0d1117;
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #00ff41;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
            margin-bottom: 5px;
        }

        .header p {
            color: #00cc33;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #00dd38;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: #161b22;
            border: 1px solid #00ff41;
            border-radius: 5px;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
            border-color: #00ff41;
        }

        .form-group input::placeholder {
            color: #00661a;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid #00ff41;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #00ff41;
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.6);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid #00ff41;
            color: #00ff41;
            display: block;
        }

        .message.error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            display: block;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            color: #00661a;
            font-size: 12px;
        }

        .footer a {
            color: #00ff41;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="container">
        <div class="terminal">
            <div class="header">
                <h1>> AURA_AI</h1>
                <p>[ СИСТЕМА ВХОДУ ]</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">// ІМ'Я КОРИСТУВАЧА</label>
                    <input type="text" id="username" name="username" placeholder="Введіть ім'я..." required>
                </div>

                <div class="form-group">
                    <label for="password">// ПАРОЛЬ</label>
                    <input type="password" id="password" name="password" placeholder="Введіть пароль..." required>
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    <span id="btnText">УВІЙТИ</span>
                </button>

                <div id="message" class="message"></div>
            </form>

            <div class="footer">
                <p>Ще немає акаунту? <a href="/register">[ ЗАРЕЄСТРУВАТИСЬ ]</a></p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            messageDiv.className = 'message';
            messageDiv.style.display = 'none';
            submitBtn.disabled = true;
            document.getElementById('btnText').textContent = 'АВТЕНТИФІКАЦІЯ...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.textContent = data.message;
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    messageDiv.textContent = data.error;
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    document.getElementById('btnText').textContent = 'УВІЙТИ';
                }
            } catch (error) {
                messageDiv.textContent = 'Помилка з\'єднання з сервером';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
                document.getElementById('btnText').textContent = 'УВІЙТИ';
            }
        });
    </script>
</body>
</html>
